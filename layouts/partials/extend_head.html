{{/* Fonts */}}
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=JetBrains+Mono&display=swap">

{{- if .Param "math" }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\[', right: '\\]', display: true},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false
  });"></script>
{{- end }}

{{- if .Param "mermaid" }}
<script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"
  onload="mermaid.initialize({
    startOnLoad: true,
    theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
    flowchart: { useMaxWidth: false },
    sequence: { useMaxWidth: false }
  });
  mermaid.run().then(function() {
    document.querySelectorAll('.mermaid-wrapper').forEach(function(wrapper) {
      var svg = wrapper.querySelector('svg');
      if (!svg) return;
      var scale = 1, x = 0, y = 0, dragging = false, startX, startY;
      svg.style.transformOrigin = '0 0';
      svg.style.cursor = 'grab';
      wrapper.addEventListener('wheel', function(e) {
        e.preventDefault();
        var delta = e.deltaY > 0 ? 0.9 : 1.1;
        var newScale = Math.min(Math.max(scale * delta, 0.3), 3);
        var rect = wrapper.getBoundingClientRect();
        var mx = e.clientX - rect.left, my = e.clientY - rect.top;
        x = mx - (mx - x) * (newScale / scale);
        y = my - (my - y) * (newScale / scale);
        scale = newScale;
        svg.style.transform = 'translate('+x+'px,'+y+'px) scale('+scale+')';
      }, {passive: false});
      wrapper.addEventListener('mousedown', function(e) {
        dragging = true; startX = e.clientX - x; startY = e.clientY - y;
        svg.style.cursor = 'grabbing';
      });
      window.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        x = e.clientX - startX; y = e.clientY - startY;
        svg.style.transform = 'translate('+x+'px,'+y+'px) scale('+scale+')';
      });
      window.addEventListener('mouseup', function() {
        dragging = false; svg.style.cursor = 'grab';
      });
      var btn = document.createElement('button');
      btn.textContent = 'Reset';
      btn.className = 'mermaid-reset';
      btn.onclick = function() {
        scale = 1; x = 0; y = 0;
        svg.style.transform = '';
      };
      wrapper.style.position = 'relative';
      wrapper.appendChild(btn);
    });
  });"></script>
{{- end }}
