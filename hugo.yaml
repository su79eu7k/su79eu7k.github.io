baseURL: "https://su79eu7k.github.io/"
languageCode: "ko"
defaultContentLanguage: "ko"
title: "Foundation"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Foundation"
  description: "Writing about things that matter to me"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShareButtons:
    - x
    - linkedin
    - reddit
    - facebook
    - telegram
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Foundation"
    Content: "Writing about things that matter to me"

  socialIcons:
    - name: github
      url: "https://github.com/su79eu7k"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/su79eu7k/su79eu7k.github.io/tree/master/content"
    Text: "Edit"
    appendFilePath: true

  math: false

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: true
    style: dracula
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
            - - $
              - $
        enable: true

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
